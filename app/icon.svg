<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="none" shape-rendering="crispEdges">
  <!-- pixel paper-plane dart, right-pointing — orange so it reads on light and dark tabs -->
  <!-- lit top wing -->
  <rect x="2" y="2" width="4" height="2" fill="#ff6a14"/>
  <rect x="2" y="4" width="8" height="2" fill="#ff6a14"/>
  <!-- centre row reaching the sharp nose at the right tip -->
  <rect x="2" y="6" width="12" height="2" fill="#ff8a3d"/>
  <!-- shaded underside -->
  <rect x="2" y="8" width="8" height="2" fill="#d2560f"/>
  <rect x="2" y="10" width="4" height="2" fill="#d2560f"/>
</svg>
